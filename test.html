<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    body {
      background: #1a1a1a;
      color: white;
      font-family: sans-serif;
      padding: 40px;
    }
  </style>
</head>
<body>
  <h1>🎹 Test Page</h1>
  <p>If you see this, the server is working!</p>
  <button onclick="testMIDI()">Test MIDI</button>
  <div id="result"></div>
  
  <script>
    console.log('Test page loaded');
    
    function testMIDI() {
      const result = document.getElementById('result');
      
      if (navigator.requestMIDIAccess) {
        result.innerHTML = '<p style="color: green;">✓ Web MIDI API is supported!</p>';
        
        navigator.requestMIDIAccess()
          .then(access => {
            const inputs = Array.from(access.inputs.values());
            result.innerHTML += `<p>Found ${inputs.length} MIDI input(s)</p>`;
            inputs.forEach(input => {
              result.innerHTML += `<p>- ${input.name}</p>`;
            });
          })
          .catch(err => {
            result.innerHTML += `<p style="color: red;">Error: ${err.message}</p>`;
          });
      } else {
        result.innerHTML = '<p style="color: red;">✗ Web MIDI API not supported in this browser</p>';
      }
    }
  </script>
</body>
</html>
